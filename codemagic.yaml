workflows:
  ios-workflow:
    name: iOS Release Workflow
    instance_type: mac_mini_m1
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic Build Key
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.manaralhudha.app.manarAlHuda
    scripts:
      - name: Fetch and create signing files automatically
        script: |
          app-store-connect fetch-signing-files "com.manaralhudha.app.manarAlHuda" --type IOS_APP_STORE --create
          xcode-project apply-profiles
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build IPA for iOS
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - nuwasoftware0@gmail.com
        notify:
          failure: true
          success: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
