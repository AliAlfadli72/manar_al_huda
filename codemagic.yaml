workflows:
  ios-release:
    name: iOS Release Build
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic Build Key
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.manaralhudha.app.manarAlHuda
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.manaralhudha.app.manarAlHuda
    scripts:
      - name: Get Flutter dependencies & prepare iOS
        script: |
          flutter pub get
          flutter build ios --config-only
          cd ios && pod install
      - name: Fetch and generate signing profiles
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
