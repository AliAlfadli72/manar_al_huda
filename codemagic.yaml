workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic Build Key

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        provisioning_profiles:
          - manar_al_huda_profile
        certificates:
          - Manar Distribution Cert

    scripts:
      - name: Get Flutter dependencies & prepare iOS
        script: |
          flutter pub get
          flutter build ios --config-only
          cd ios && pod install

      - name: Configure code signing
        script: xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
          echo "=== BUILD OUTPUT FILES ==="
          ls -la build/ios/ipa || true
          find build -name "*.ipa" -o -name "*.xcarchive" || true

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - "*.ipa"
      - "**/*.ipa"
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
