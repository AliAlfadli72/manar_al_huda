workflows:
  ios-workflow:
    name: iOS Release Workflow
    instance_type: mac_mini_m1
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic Build Key
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        IPHONEOS_DEPLOYMENT_TARGET: "15.0"
      ios_signing:
        provisioning_profiles:
          - manar_al_huda_profile
        certificates:
          - Manar Distribution Cert
    scripts:
      - name: Get Flutter packages & install pods
        script: |
          flutter packages pub get
          flutter build ios --config-only
          echo "IPHONEOS_DEPLOYMENT_TARGET = 15.0" >> ios/Flutter/Generated.xcconfig
          find ios/Flutter/ephemeral/Packages -name "Package.swift" -exec sed -i '' 's/\.v11/\.v15/g; s/\.v12/\.v15/g; s/\.v13/\.v15/g; s/\.v14/\.v15/g' {} + 2>/dev/null || true
          cd ios && pod install
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build IPA for iOS
        script: |
          xcode-project build-ipa --workspace ios/Runner.xcworkspace --scheme Runner
    artifacts:
      - build/ios/ipa/*.ipa
      - "**/*.ipa"
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - nuwasoftware0@gmail.com
        notify:
          failure: true
          success: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
