workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic Build Key

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get

      - name: Create certificate and provisioning profile
        script: |
          # Initialize a fresh unlocked keychain for this build
          keychain initialize

          # Fetch existing signing files or create if not present
          app-store-connect fetch-signing-files com.manaralhudha.app.manarAlHuda \
            --type IOS_APP_STORE || app-store-connect fetch-signing-files com.manaralhudha.app.manarAlHuda --type IOS_APP_STORE --create

          # Add the .p12 certificate to the initialized keychain
          keychain add-certificates

      - name: Remove alpha channel from app icons
        script: |
          find ios/Runner/Assets.xcassets/AppIcon.appiconset -name "*.png" | while read icon; do
            sips -s format bmp "$icon" --out /tmp/_icon_tmp.bmp 2>/dev/null
            sips -s format png /tmp/_icon_tmp.bmp --out "$icon" 2>/dev/null
          done

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install

      - name: Configure code signing
        script: xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
